<div class="container">

  <header class="header">
    <h1>Kaspi.kz Online Store</h1>
    <p class="product-count">{{ products.length }} товаров</p>
  </header>

  <div class="product-grid">
    @for (p of products; track p.id) {
      <app-product-card
        [product]="p"
        (toggleFavorite)="onToggle($event)">
      </app-product-card>
    }
  </div>

</div>
